name: caiico-loong64

on:
  workflow_dispatch:

jobs:
  build:
    name: 编译构建 (loong64)
    runs-on: ubuntu-24.04

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 QEMU（loong64 模拟）
      uses: docker/setup-qemu-action@v3

    - name: 在 deepin-loong64 容器中编译
      run: |
        docker run --platform linux/loong64 \
          -v "${{ github.workspace }}:/workspace" \
          -w /workspace \
          linuxdeepin/deepin:crimson-loong64 \
          bash -c '
            set -e

            apt update
            apt install -y \
              python3-dev python3-pip build-essential \
              libqt5concurrent5 libqt5core5a libqt5dbus5 libqt5widgets5 libqt5gui5 \
              pkg-config

            pip3 config set global.index-url https://mirrors.loong64.com/pypi/simple
            pip3 install setuptools pyqt5 pefile pillow --break-system-packages

            nuitka --onefile --windows-icon-from-ico=./cai_ico.ico --standalone --windows-console-mode=disable --show-progress --lto=yes --jobs=4 --enable-plugins=pyqt6 --include-data-file=./cai_ico.ico=./cai_ico.ico --include-data-file=./chs.qm=./chs.qm icon-ex20-linux-qt5.py
          '

    - name: 上传构建产物
      uses: actions/upload-artifact@v4
      with:
        name: caiico-loong64
        path: ./
